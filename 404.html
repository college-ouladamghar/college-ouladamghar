<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — الصفحة غير موجودة | ثانوية ولاد أمغار</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body data-lang="ar">

  <nav class="navbar scrolled" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <span class="logo-ar">ثانوية ولاد أمغار</span>
        <span class="logo-divider">|</span>
        <span class="logo-fr">Al Nour</span>
      </a>
      <div class="nav-actions">
        <div class="lang-switcher">
          <button class="lang-btn active" data-lang="ar">ع</button>
          <button class="lang-btn" data-lang="fr">Fr</button>
          <button class="lang-btn" data-lang="en">En</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="page-404">
    <div class="page-404-inner animate-in">
      <p class="page-404-code">404</p>
      <h1 data-i18n="e404.title">عذراً، الصفحة غير موجودة</h1>
      <p data-i18n="e404.desc">ربما تم نقل هذه الصفحة أو حذفها. يمكنك العودة إلى الصفحة الرئيسية.</p>
      <a href="index.html" class="btn btn-primary" data-i18n="e404.btn">العودة إلى الرئيسية</a>
    </div>
  </main>

  <script src="js/i18n.js"></script>
  <script>
    // Simple nav scroll for 404
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        });
      });
    });
  </script>
</body>
</html>
